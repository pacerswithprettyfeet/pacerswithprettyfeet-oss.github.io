<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finishers: NEB and TSR</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #f5f7fb;
      font-family: Arial, sans-serif;
      color: #1f2937;
    }

    .wrap {
      max-width: 800px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 24px 28px 14px;
      border-bottom: 1px solid #e5e7eb;
    }

    .title {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 14px;
      color: #6b7280;
    }

    .table-wrap {
      padding: 20px 28px 28px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }

    thead th {
      text-align: left;
      background: #eef2ff;
      color: #1e3a8a;
      padding: 12px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tbody td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    tbody tr:hover {
      background: #f9fafb;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .player {
      font-weight: 600;
    }

    .note {
      margin-top: 14px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1 class="title">Finishers: NEB and TSR</h1>
    <div class="subtitle">
      Placeholder innings — replace with final values later
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Player</th>
          <th class="num">NEB</th>
          <th class="num">TSR</th>
          <th class="num">Innings</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="player">MS Dhoni</td>
          <td class="num">3.98</td>
          <td class="num">-0.11</td>
          <td class="num">180</td>
        </tr>
        <tr>
          <td class="player">DA Miller</td>
          <td class="num">2.66</td>
          <td class="num">0.27</td>
          <td class="num">125</td>
        </tr>
        <tr>
          <td class="player">KA Pollard</td>
          <td class="num">1.44</td>
          <td class="num">7.56</td>
          <td class="num">150</td>
        </tr>
      </tbody>
    </table>

    <div class="note">
      Note: Innings values are placeholders.
    </div>
  </div>
</div>

</body>
</html>
