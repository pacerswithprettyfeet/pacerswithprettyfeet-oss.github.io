<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Death Overs: NEB vs True SR</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
    }
  
    #chart {
      width: 100%;
      /* height: min(75vh, 760px); */
      height: 900px;
    }
  </style>
</head>
<body>

<div id="chart"></div>

<script>
const deathData = [
  { player: "AD Russell", neb: 1.101576751, trueSR: 30.28, category: "Itchy Hands" },
  { player: "HH Pandya", neb: 1.137062855, trueSR: 1.23, category: "Conventional Anchors" },
  { player: "KA Pollard", neb: 1.447257933, trueSR: 7.56, category: "Itchy Hands" },
  { player: "MP Stoinis", neb: 0.86351033, trueSR: 4.11, category: "Conventional Anchors" },
  { player: "MS Dhoni", neb: 3.977290172, trueSR: -0.11, category: "Safe Houses" },
  { player: "R Tewatia", neb: 1.035971224, trueSR: -12.71, category: "Conventional Anchors" },
  { player: "SO Hetmyer", neb: 1.11944858, trueSR: 1.06, category: "Conventional Anchors" },
  { player: "TH David", neb: 1.99324246, trueSR: 16.22, category: "Itchy Hands" },
  { player: "V Shankar", neb: 1.04909539, trueSR: -16.04, category: "Conventional Anchors" },
  { player: "RK Singh", neb: 1.693061153, trueSR: -5.26, category: "Conventional Anchors" },
  { player: "BJ Hodge", neb: 2.97873553, trueSR: 1.65, category: "Conventional Anchors" },
  { player: "DA Miller", neb: 2.6608647, trueSR: 0.27, category: "Conventional Anchors" }
];

const categoryStyles = {
  "Itchy Hands": {
    color: "rgba(55, 126, 184, 1)",
    fill: "rgba(55, 126, 184, 0.35)"
  },
  "Conventional Anchors": {
    color: "rgba(77, 175, 74, 1)",
    fill: "rgba(77, 175, 74, 0.35)"
  },
  "Safe Houses": {
    color: "rgba(255, 127, 0, 1)",
    fill: "rgba(255, 127, 0, 0.35)"
  }
};

const playerTrace = {
  x: deathData.map(d => d.neb),
  y: deathData.map(d => d.trueSR),
  text: deathData.map(d => d.player),
  customdata: deathData.map(d => d.category),
  mode: "markers+text",
  type: "scatter",
  name: "Players",
  textposition: "top center",
  marker: {
    size: 10,
    color: deathData.map(d => categoryStyles[d.category].fill),
    line: {
      color: deathData.map(d => categoryStyles[d.category].color),
      width: 2
    }
  },
  hovertemplate:
    "<b>%{text}</b><br>" +
    "NEB: %{x:.3f}<br>" +
    "True SR: %{y:.2f}<br>" +
    "Category: %{customdata}<extra></extra>"
};

const legendTraces = [
  {
    x: [null], y: [null],
    mode: "markers",
    type: "scatter",
    name: "Itchy Hands",
    marker: {
      size: 14,
      color: "rgba(55, 126, 184, 0.35)",
      line: { color: "rgba(55, 126, 184, 1)", width: 2 }
    },
    hoverinfo: "skip"
  },
  {
    x: [null], y: [null],
    mode: "markers",
    type: "scatter",
    name: "Conventional Anchors",
    marker: {
      size: 14,
      color: "rgba(77, 175, 74, 0.35)",
      line: { color: "rgba(77, 175, 74, 1)", width: 2 }
    },
    hoverinfo: "skip"
  },
  {
    x: [null], y: [null],
    mode: "markers",
    type: "scatter",
    name: "Safe Houses",
    marker: {
      size: 14,
      color: "rgba(255, 127, 0, 0.35)",
      line: { color: "rgba(255, 127, 0, 1)", width: 2 }
    },
    hoverinfo: "skip"
  }
];

const layout = {
  title: "Death Overs: NEB vs TSR",
  template: "plotly_white",
  autosize: true,
  hovermode: "closest",
  xaxis: {
    title: "NEB",
    range: [0.7, 4.2]
  },
  yaxis: {
    title: "TSR",
    range: [-19.5, 32.5]
  },
  shapes: [
    // Itchy Hands - Russell / Pollard / David zone
    {
      type: "rect",
      xref: "x",
      yref: "y",
      x0: 0.93,
      x1: 2.20,
      y0: 6.7,
      y1: 32.2,
      line: { color: "rgba(55, 126, 184, 1)", width: 4 },
      fillcolor: "rgba(55, 126, 184, 0.18)"
    },

    // Conventional Anchors - includes Stoinis, Miller, Hodge zone
    {
      type: "rect",
      xref: "x",
      yref: "y",
      x0: 0.72,
      x1: 3.14,
      y0: -8.3,
      y1: 6.0,
      line: { color: "rgba(77, 175, 74, 1)", width: 4 },
      fillcolor: "rgba(77, 175, 74, 0.18)"
    },

    // Safe Houses - Dhoni zone
    {
      type: "rect",
      xref: "x",
      yref: "y",
      x0: 3.78,
      x1: 4.17,
      y0: -4.7,
      y1: 3.3,
      line: { color: "rgba(255, 127, 0, 1)", width: 4 },
      fillcolor: "rgba(255, 127, 0, 0.18)"
    }
  ],
  legend: {
    x: 1.02,
    y: 1,
    xanchor: "left",
    yanchor: "top",
    bgcolor: "rgba(255,255,255,0.85)",
    bordercolor: "rgba(0,0,0,0.15)",
    borderwidth: 1,
    font: { size: 14 }
  },
  margin: { l: 80, r: 120, t: 80, b: 80 }
};

Plotly.newPlot(
  "chart",
  [playerTrace, ...legendTraces],
  layout,
  { responsive: true }
);
</script>

</body>
</html>
