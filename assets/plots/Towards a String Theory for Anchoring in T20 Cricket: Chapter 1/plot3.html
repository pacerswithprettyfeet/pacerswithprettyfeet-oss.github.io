<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TSR of Selected Batters</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #f5f7fb;
      font-family: Arial, sans-serif;
      color: #1f2937;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 24px 28px 14px;
      border-bottom: 1px solid #e5e7eb;
    }

    .title {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: #6b7280;
    }

    .chart-wrap {
      padding: 24px 28px 28px;
      height: 700px;
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1 class="title">TSR of Selected Batters</h1>
  </div>

  <div class="chart-wrap">
    <canvas id="tsrChart"></canvas>
  </div>
</div>

<script>
  const rawData = [
    { player: "V Sehwag", tsr: 45.67, innings: 104 },
    { player: "CH Gayle", tsr: 31.24, innings: 141 },
    { player: "H Klaasen", tsr: 26.47, innings: 45 },
    { player: "DA Warner", tsr: 19.20, innings: 184 },
    { player: "AB de Villiers", tsr: 19.00, innings: 170 },
    { player: "JC Buttler", tsr: 16.58, innings: 119 },
    { player: "SA Yadav", tsr: 14.96, innings: 151 },
    { player: "S Raina", tsr: 11.45, innings: 200 },
    { player: "Shubman Gill", tsr: 4.50, innings: 114 },
    { player: "KL Rahul", tsr: 4.49, innings: 135 },
    { player: "V Kohli", tsr: 2.79, innings: 259 }
  ];

  rawData.sort((a, b) => b.tsr - a.tsr);

  const labels = rawData.map(d => d.player);
  const values = rawData.map(d => d.tsr);
  const innings = rawData.map(d => d.innings);

  const colors = rawData.map(d => {
    return "rgba(37, 99, 235, 0.82)";
  });

  const borderColors = rawData.map(d => {
    return "rgba(29, 78, 216, 1)";
  });

  const valueLabelPlugin = {
    id: "valueLabelPlugin",
    afterDatasetsDraw(chart) {
      const { ctx } = chart;
      const meta = chart.getDatasetMeta(0);

      ctx.save();
      ctx.font = "12px Arial";
      ctx.fillStyle = "#1f2937";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";

      meta.data.forEach((bar, i) => {
        ctx.fillText(values[i].toFixed(2), bar.x + 8, bar.y);
      });

      ctx.restore();
    }
  };

  new Chart(document.getElementById("tsrChart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: colors,
        borderColor: borderColors,
        borderWidth: 1.5,
        borderRadius: 6,
        barPercentage: 0.72,
        categoryPercentage: 0.84
      }]
    },
    options: {
      indexAxis: "y",
      responsive: true,
      maintainAspectRatio: false,
      layout: {
        padding: {
          right: 40
        }
      },
      plugins: {
        legend: {
          display: false
        },
        tooltip: {
          callbacks: {
            title: function(context) {
              return context[0].label;
            },
            label: function(context) {
              const i = context.dataIndex;
              return [
                "TSR: " + values[i].toFixed(2),
                "Innings: " + innings[i]
              ];
            }
          }
        }
      },
      scales: {
        x: {
          beginAtZero: true,
          grid: {
            color: "rgba(0,0,0,0.08)"
          },
          title: {
            display: true,
            text: "TSR",
            font: {
              size: 14,
              weight: "bold"
            }
          }
        },
        y: {
          grid: {
            display: false
          },
          ticks: {
            font: {
              size: 13
            }
          }
        }
      }
    },
    plugins: [valueLabelPlugin]
  });
</script>

</body>
</html>
