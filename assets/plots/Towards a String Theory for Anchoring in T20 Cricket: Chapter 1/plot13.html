<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PsP Radar by Entry Phase</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      padding: 28px;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
  
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }
  
    .header {
      padding: 24px 28px 12px;
      border-bottom: 1px solid #e5e7eb;
    }
  
    .title {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      color: #111827;
    }
  
    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.5;
      color: #6b7280;
    }
  
    .chart-wrap {
      padding: 16px 28px 20px;
      height: 520px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1 class="title">PsP by Entry Phase</h1>
      <div class="subtitle">
        Empty segments indicate no innings at that entry point. Click a name to toggle that batter's statistics on or off.
      </div>
    </div>

    <div class="chart-wrap">
      <canvas id="radarChart"></canvas>
    </div>
  </div>
  <script>
    const labels = ["1-3", "4-6", "7-9", "10-12", "13-15", "16-18", "19-20"];

    const radarData = {
      labels,
      datasets: [
        {
          label: "Sai Sudharsan",
          data: [-4.94, 3.27, -4.09, null, null, null, null],
          borderWidth: 2,
          fill: false
        },
      
        {
          label: "C Gayle",
          data: [-13.71, -9.13, -9.58, null, null, null, null],
          borderWidth: 2,
          fill: false
        },
        {
          label: "M Marsh",
          data: [-14.85,-18.66,-15.94,-6.32,-2.84,-5.15, null],
          borderWidth: 2,
          fill: false
        },
        {
          label: "M Hussey",
          data: [-9.04,-10.87, null, null, null, null, null],
          borderWidth: 2,
          fill: false
        },
        {
          label: "T Varma",
          data: [-4.05,-3.01,-2.73,-9.07,-0.55,-1.77, null],
          borderWidth: 2,
          fill: false
        },
        {
          label: "A Rahane",
          data: [-13.71,-13.06,-10.90,-7.24,0,-0.93],
          borderWidth: 2,
          fill: false
        },
        {
          label: "R Dravid",
          data: [-8.09,-10.85,-7.31,-13.14,-1.65,-8.32, null],
          borderWidth: 2,
          fill: false
        },
        {
          label: "KL Rahul",
          data: [-8.47,-13.68,-3.06,-7.13,0,0,-1.35],
          borderWidth: 2,
          fill: false
        },
        {
          label: "A Russell",
          data: [0,-1.38,-13.68,-5.25,-6.56,-4.55,0.40],
          borderWidth: 2,
          fill: false
        },
        {
          label: "V Iyer",
          data: [-13.40,-14.38,-13.26,-1.09,0,0,-0.94],
          borderWidth: 2,
          fill: false
        },
        {
          label: "AB de Villiers",
          data: [-11.78, -10.99, -9.72, -9.22, -2.14, -3.14, null],
          borderWidth: 2,
          fill: false
        },
        {
          label: "D Warner",
          data: [-13.30, -7.10, -5.49, -7.11, null, null, null],
          borderWidth: 2,
          fill: false
        },
        {
          label: "J Buttler",
          data: [-14.31, -12.66, -6.69, -3.51, -3.94, -0.08, null],
          borderWidth: 2,
          fill: false
        },
        {
          label: "H Klaasen",
          data: [-17.12, -12.67, -3.07, -7.18, 1.06, null, null],
          borderWidth: 2,
          fill: false
        },
        {
          label: "SA Yadav",
          data: [-9.88, -9.63, -9.98, -7.46, -3.67, -4.46, -0.87],
          borderWidth: 2,
          fill: false
        }
      ]
    };

    new Chart(document.getElementById("radarChart"), {
      type: "radar",
      data: radarData,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        elements: {
          line: {
            tension: 0.15
          },
          point: {
            radius: 3,
            hoverRadius: 5
          }
        },
        plugins: {
          legend: {
            position: "right",
            labels: {
              boxWidth: 14,
              padding: 14,
              font: {
                size: 12
              }
            }
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                const value = context.raw;
                return value === null ? `${context.dataset.label}: blank` : `${context.dataset.label}: ${value}`;
              }
            }
          }
        },
        scales: {
          r: {
            suggestedMin: -20,
            suggestedMax: 5,
            ticks: {
              backdropColor: "transparent"
            },
            grid: {
              color: "rgba(0,0,0,0.10)"
            },
            angleLines: {
              color: "rgba(0,0,0,0.10)"
            },
            pointLabels: {
              font: {
                size: 13,
                weight: "bold"
              },
              color: "#374151"
            }
          }
        }
      }
    });
  </script>
</body>
</html>
