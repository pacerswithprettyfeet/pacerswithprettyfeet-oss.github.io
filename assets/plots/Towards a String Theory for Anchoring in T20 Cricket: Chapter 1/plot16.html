<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Highest MEB in Each IPL Season</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #f5f7fb;
      font-family: Arial, sans-serif;
      color: #1f2937;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 24px 28px 14px;
      border-bottom: 1px solid #e5e7eb;
    }

    .title {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.5;
    }

    .chart-wrap {
      padding: 24px 28px 28px;
      height: 1100px;
    }

    .note {
      padding: 0 28px 28px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1 class="title">Season-wise Highest MEB</h1>
  </div>

  <div class="chart-wrap">
    <canvas id="mebChart"></canvas>
  </div>

</div>

<script>
const seasonData = [
  { season: "2008", player: "SE Marsh", meb: 20.76 },
  { season: "2009", player: "ML Hayden", meb: 13.43 },
  { season: "2010", player: "SR Tendulkar", meb: 9.78 },
  { season: "2011", player: "S Badrinath", meb: 10.23 },
  { season: "2012", player: "CH Gayle", meb: 10.19 },
  { season: "2013", player: "MEK Hussey", meb: 13.55 },
  { season: "2014", player: "LMP Simmons", meb: 12.81 },
  { season: "2015", player: "LMP Simmons", meb: 12.36 },
  { season: "2016", player: "V Kohli", meb: 16.45 },
  { season: "2017", player: "DA Warner", meb: 10.62 },
  { season: "2018", player: "KS Williamson", meb: 10.86 },
  { season: "2019", player: "DA Warner", meb: 15.58 },
  { season: "2020", player: "KL Rahul", meb: 14.00 },
  { season: "2021", player: "KL Rahul", meb: 11.93 },
  { season: "2022", player: "JC Buttler", meb: 12.55 },
  { season: "2023", player: "F du Plessis", meb: 12.30 },
  { season: "2024", player: "V Kohli", meb: 12.19 },
  { season: "2025", player: "B Sai Sudharsan", meb: 10.96 }
];

const labels = seasonData.map(d => `${d.season} — ${d.player}`);
const values = seasonData.map(d => d.meb);

const valueLabelPlugin = {
  id: "valueLabelPlugin",
  afterDatasetsDraw(chart) {
    const { ctx } = chart;
    const meta = chart.getDatasetMeta(0);

    ctx.save();
    ctx.font = "12px Arial";
    ctx.fillStyle = "#111827";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";

    meta.data.forEach((bar, i) => {
      ctx.fillText(values[i].toFixed(2), bar.x + 8, bar.y);
    });

    ctx.restore();
  }
};

new Chart(document.getElementById("mebChart"), {
  type: "bar",
  data: {
    labels: labels,
    datasets: [{
      label: "MEB",
      data: values,
      backgroundColor: labels.map(() => "rgba(59, 130, 246, 0.85)"),
      borderRadius: 6,
      barPercentage: 0.72,
      categoryPercentage: 0.84
    }]
  },
  options: {
    indexAxis: "y",
    responsive: true,
    maintainAspectRatio: false,
    layout: {
      padding: {
        right: 50
      }
    },
    plugins: {
      legend: {
        display: false
      },
      tooltip: {
        callbacks: {
          label: function(context) {
            return `MEB: ${context.parsed.x.toFixed(2)}`;
          }
        }
      }
    },
    scales: {
      x: {
        beginAtZero: true,
        title: {
          display: true,
          text: "MEB",
          font: {
            size: 14,
            weight: "bold"
          }
        },
        grid: {
          color: "rgba(0,0,0,0.08)"
        }
      },
      y: {
        grid: {
          display: false
        },
        ticks: {
          font: {
            size: 12
          }
        }
      }
    }
  },
  plugins: [valueLabelPlugin]
});
</script>

</body>
</html>
