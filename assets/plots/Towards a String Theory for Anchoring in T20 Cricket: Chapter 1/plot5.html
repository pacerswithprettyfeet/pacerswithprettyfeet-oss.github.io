<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MS Dhoni Entry Points and NEB</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #f5f7fb;
      font-family: Arial, sans-serif;
      color: #1f2937;
    }

    .wrap {
      max-width: 800px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 24px 28px 14px;
      border-bottom: 1px solid #e5e7eb;
    }

    .title {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 14px;
      color: #6b7280;
    }

    .table-wrap {
      padding: 20px 28px 28px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }

    thead th {
      text-align: left;
      background: #eef2ff;
      color: #1e3a8a;
      padding: 12px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tbody td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    tbody tr:hover {
      background: #f9fafb;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .phase {
      font-weight: 600;
    }

    .note {
      margin-top: 14px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1 class="title">MS Dhoni: Entry Point vs NEB</h1>
    <div class="subtitle">
      Distribution of innings by entry phase and corresponding NEB
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Entry Phase (Overs)</th>
          <th class="num">NEB</th>
          <th class="num">Innings</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="phase">1–3</td>
          <td class="num">-3.17</td>
          <td class="num">3</td>
        </tr>
        <tr>
          <td class="phase">4–6</td>
          <td class="num">5.07</td>
          <td class="num">14</td>
        </tr>
        <tr>
          <td class="phase">7–9</td>
          <td class="num">6.85</td>
          <td class="num">33</td>
        </tr>
        <tr>
          <td class="phase">10–12</td>
          <td class="num">6.06</td>
          <td class="num">55</td>
        </tr>
        <tr>
          <td class="phase">13–15</td>
          <td class="num">3.53</td>
          <td class="num">65</td>
        </tr>
        <tr>
          <td class="phase">16–18</td>
          <td class="num">2.00</td>
          <td class="num">52</td>
        </tr>
        <tr>
          <td class="phase">19–20</td>
          <td class="num">0.21</td>
          <td class="num">19</td>
        </tr>
      </tbody>
    </table>

    <div class="note">
      NEB values rounded to two decimals for readability.
    </div>
  </div>
</div>

</body>
</html>
