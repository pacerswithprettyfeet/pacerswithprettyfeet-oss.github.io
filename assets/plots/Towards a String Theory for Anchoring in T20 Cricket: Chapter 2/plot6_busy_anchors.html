<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Busy Anchors Radar</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 18px 28px 10px;
      border-bottom: 1px solid #e5e7eb;
    }

    .title {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      color: #111827;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.5;
      color: #6b7280;
    }

    .chart-wrap {
      padding: 0 20px;
      height: 380px;
    }

    .note {
      padding: 10px 28px 18px;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <h1 class="title">Busy Anchors</h1>
    </div>

    <div class="chart-wrap">
      <canvas id="radarChart"></canvas>
    </div>

  </div>

  <script>
    const ctx = document.getElementById("radarChart");

    const radarData = {
      labels: ["True Dots", "True Jogs", "True Boundaries"],

      datasets: [
        {
          label: "AB de Villiers",
          data: [-0.045702963, 0.014644943, 0.031337432],
          borderWidth: 3,
          pointRadius: 4,
          pointHoverRadius: 6,
          fill: true,
          backgroundColor: "rgba(220, 38, 38, 0.10)",
          borderColor: "rgba(220, 38, 38, 0.95)",
          pointBackgroundColor: "rgba(220, 38, 38, 0.95)"
        },
        {
          label: "H Klaasen",
          data: [-0.077568197, 0.048576976, 0.02911721],
          borderWidth: 3,
          pointRadius: 4,
          pointHoverRadius: 6,
          fill: true,
          backgroundColor: "rgba(37, 99, 235, 0.10)",
          borderColor: "rgba(37, 99, 235, 0.95)",
          pointBackgroundColor: "rgba(37, 99, 235, 0.95)"
        },
        {
          label: "DA Warner",
          data: [-0.05288833, 0.024672652, 0.028450569],
          borderWidth: 3,
          pointRadius: 4,
          pointHoverRadius: 6,
          fill: true,
          backgroundColor: "rgba(22, 163, 74, 0.10)",
          borderColor: "rgba(22, 163, 74, 0.95)",
          pointBackgroundColor: "rgba(22, 163, 74, 0.95)"
        },
        {
          label: "DP Conway",
          data: [-0.044944604, 0.022458277, 0.022944897],
          borderWidth: 3,
          pointRadius: 4,
          pointHoverRadius: 6,
          fill: true,
          backgroundColor: "rgba(147, 51, 234, 0.10)",
          borderColor: "rgba(147, 51, 234, 0.95)",
          pointBackgroundColor: "rgba(147, 51, 234, 0.95)"
        },
        {
          label: "Par",
          data: [0, 0, 0],
          borderWidth: 2,
          pointRadius: 3,
          pointHoverRadius: 5,
          fill: false,
          borderColor: "rgba(17, 24, 39, 0.70)",
          pointBackgroundColor: "rgba(17, 24, 39, 0.70)",
          borderDash: [6, 6]
        }
      ]
    };

    new Chart(ctx, {
      type: "radar",
      data: radarData,

      options: {
        responsive: true,
        maintainAspectRatio: false,

        layout: {
          padding: {
            top: 0,
            bottom: 0,
            left: 0,
            right: 0
          }
        },

        elements: {
          line: {
            tension: 0
          }
        },

        plugins: {
          legend: {
            position: "right",
            labels: {
              boxWidth: 14,
              padding: 14,
              font: {
                size: 13
              }
            }
          },

          tooltip: {
            callbacks: {
              label: function(context) {
                const value = Number(context.raw);
                return context.dataset.label + ": " + (value * 100).toFixed(2) + "%";
              }
            }
          }
        },

        scales: {
          r: {
            min: -0.10,
            max: 0.10,
            beginAtZero: false,

            ticks: {
              display: true,
              showLabelBackdrop: false,
              backdropColor: "transparent",
              stepSize: 0.02,
              padding: -2,
              callback: function(value) {
                return (Number(value) * 100).toFixed(0) + "%";
              }
            },

            grid: {
              circular: false,
              color: "rgba(0,0,0,0.12)"
            },

            angleLines: {
              display: true,
              color: "rgba(0,0,0,0.20)"
            },

            pointLabels: {
              padding: -10,
              font: {
                size: 14,
                weight: "bold"
              },
              color: "#374151"
            }
          }
        }
      }
    });
  </script>
</body>
</html>
